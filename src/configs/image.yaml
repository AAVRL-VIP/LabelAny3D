scene:
  type: 'InTheWild'
  attributes:
    img_path: '../imgs/demo_1.jpg'
  annotations_path: ''
  save_dir: '../out/demo_1'
  K: []
run:
  use_enhancement: True
  only_foreground: True 
  single_object: False  # False [compositional reconstruction], True [all instances are reconstructed as one]
  reproject: False # True [pixels are reprojected before instance reconstruction], False [direct cropping of instance, ablation of reprojection]
  depth_edge_threshold: 0.0001
  amodal_completion: 'our'  # options: 'our', null [ablation of amodal completion]
  obj_rec: 'amodal3r'
  depth:
    metric: 'unidepth'   # options: 'gt', 'gt_ss', 'depthanything', 'metric3d', 'unidepth'
    relative: null # options: 'marigold', 'metric3d', 'moge', null
  # segmentation is handled exclusively by SAM3 (src/sam3_seg_for_la3d.py); no in-config options
  calibration:
    intrinsics: 'perspectivefields'  # options: 'gt', 'perspectivefields'
    pose: null  # options: 'gt', null
  clip_bg: False # True [parts of the reconstructed instaces that intersect the background mesh are trimmed]
